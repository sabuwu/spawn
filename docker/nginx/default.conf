server {
    listen 80;
    listen [::]:80;
    server_name https://shiny-fortnight-qv76xp7gv4gqc9w97-8000.app.github.dev;

    root /var/www/html/public;
    
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    server_tokens off;

    index index.php

    charset utf-8;

    # - Fallback de tráfego
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # - Desativar logs inúteis
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # - Configuração do FastCGI
    location ˜ \.php$ {
        fastcgi_pass spawn_app:9000;
        fastgci_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_hide_header X-Powered-By;
    }

    location ˜ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

}

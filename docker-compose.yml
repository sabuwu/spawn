services:
  # - Container principal (PHP-FPM)
  spawn_app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile # Caminho corrigido aqui
    container_name: spawn_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - spawn_network
  
  # - Servidor web para o php-fpm
  spawn_web:
    image: nginx:alpine
    container_name: spawn_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - spawn_app
    networks:
      - spawn_network

  # - Banco de dados
  spawm_db:
    image: postgres:15-alpine
    container_name: spawm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spawn_db
      POSTGRES_USER: spawn_user
      POSTGRES_PASSWORD: secret_password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    networks:
      - spawn_network

  # - Microsserviço isolado em Python
  spawn_python_service:
    image: python:3.12-alpine
    container_name: spawn_python_service
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./python_src:/app
    networks:
      - spawn_network

networks:
  spawn_network:
    driver: bridge
    
volumes:
  db_data:
  